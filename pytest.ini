
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto
markers =
    asyncio: Marks tests to run with asyncio
    
    # 测试类型标记
    unit: 单元测试（使用内存数据库和 Mock，速度快）
    integration: 集成测试（使用真实 PostgreSQL/Redis）
    e2e: 端到端测试（完整环境，包括 Testcontainers）
    
    # 速度标记
    slow: 慢速测试（执行时间 > 1秒）
    fast: 快速测试（执行时间 < 100ms）
    
    # 功能模块标记
    auth: 认证相关测试
    chat: 聊天功能测试
    conversation: 会话管理测试
    knowledge: 知识库测试
    
    # 环境要求标记
    requires_db: 需要数据库的测试
    requires_redis: 需要 Redis 的测试
    requires_external: 需要外部服务的测试

